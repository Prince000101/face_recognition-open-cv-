dashboard:
  image: nginx:${{TAG}}
  build:
    context: .
    dockerfile: Dockerfile.dashboard
    args:
      NODE_ENV: production
  ports:
    - "8000:8000"
  environment:
    - LOG_LEVEL=WARNING
    - CACHE_TTL=3600
  volumes:
    - dashboard_data:/var/lib/data
  restart: unless-stopped


migration:
  image: node:${{TAG}}
  build:
    context: .
    dockerfile: Dockerfile.migration
    args:
      NODE_ENV: production
  ports:
    - "4000:4000"
  environment:
    - LOG_LEVEL=INFO
    - CACHE_TTL=600
  volumes:
    - migration_data:/var/lib/data
  restart: unless-stopped
