model:
  image: node:${{TAG}}
  build:
    context: .
    dockerfile: Dockerfile.model
    args:
      NODE_ENV: production
  ports:
    - "8080:8080"
  environment:
    - LOG_LEVEL=WARNING
    - CACHE_TTL=300
  volumes:
    - model_data:/var/lib/data
  restart: unless-stopped


profile:
  image: node:${{TAG}}
  build:
    context: .
    dockerfile: Dockerfile.profile
    args:
      NODE_ENV: production
  ports:
    - "4000:4000"
  environment:
    - LOG_LEVEL=INFO
    - CACHE_TTL=3600
  volumes:
    - profile_data:/var/lib/data
  restart: unless-stopped
